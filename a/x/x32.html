<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网上用户铆钉分享</title>
    <meta name="keywords" content="网上用户铆钉分享,实心铆钉,空心铆钉,抽芯铆钉,不锈钢铆钉,铝铆钉" />
    <style>
        body {
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .search-wrapper {
            max-width: 700px;
            margin: 20px auto;
        }
        .search-form {
            display: flex;
            height: 44px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .search-input {
            flex: 1;
            padding: 0 15px;
            border: 1px solid #ff4400;
            border-right: none;
            outline: none;
            font-size: 14px;
            border-radius: 4px 0 0 4px;
            box-sizing: border-box;
        }
        .search-btn {
            min-width: 80px;
            background-color: #ff4400;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .search-btn:hover {
            background-color: #f53f00;
        }
        .keyword-category {
            margin: 25px 0;
        }
        .category-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 600;
            border-left: 3px solid #ff4400;
            padding-left: 8px;
        }
        .keyword-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .keyword-btn {
            padding: 6px 14px;
            background-color: #fff;
            border: 1px solid #ff4400;
            color: #ff4400;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .keyword-btn:hover {
            background-color: #ff4400;
            color: #fff;
        }
        .btn-container {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 12px;
            padding: 10px;
            box-sizing: border-box;
        }
        .app-btn {
            display: inline-block;
            background-color: #e6f7ff;
            color: #1890ff;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .app-btn:hover {
            background-color: #bae7ff;
            color: #096dd9;
        }
    </style>
</head>
<body>
    <!-- 搜索框区域 -->
    <div class="search-wrapper">
        <form class="search-form" id="searchForm">
            <input type="search" class="search-input" name="q" placeholder="请输入搜索关键词（如：不锈钢铆钉）" required>
            <button type="submit" class="search-btn">搜索</button>
        </form>
    </div>

    <!-- 店铺按钮容器 -->
    <div class="btn-container">
        <a href="/" target="_blank" class="app-btn"></a>
    </div>

    <!-- 铆钉关键词区域 -->
    <div style="max-width: 700px; margin: 0 auto;">
        <div id="linkContainer"></div>
    </div>

    <script>
               // 统一设备判断
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // 顶部搜索跳转链接
        const urls = {
            // mobileApp 手机端唤起淘宝APP链接
            mobileApp: "taobao://ai.m.taobao.com/search.html?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781582035%402103e876_1697_19ece907902_04ff%4001&q=",
            // mobileWeb 手机浏览器网页链接
            mobileWeb: "https://ai.m.taobao.com/search.html?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781582035%402103e876_1697_19ece907902_04ff%4001&q=",
            // pcWeb 电脑PC端网页链接
            pcWeb: "https://ai.taobao.com/search/index.htm?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781581630%400b11d4cc_15e6_19ece8a4d26_050d%4001&key="
        };

        // 关键词跳转链接
        const linksConfig = {
            // mobileBase 关键词跳转-手机唤起淘宝APP链接
            mobileBase: "taobao://ai.m.taobao.com/search.html?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781582035%402103e876_1697_19ece907902_04ff%4001&q=",
            // pcBase 关键词跳转-电脑PC端网页链接
            pcBase: "https://ai.taobao.com/search/index.htm?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781581630%400b11d4cc_15e6_19ece8a4d26_050d%4001&key="
        };

        // 100个铆钉相关关键词
        const categoryKeywords = {
            "铆钉全品类": [
                "铆钉","实心铆钉","空心铆钉","抽芯铆钉","拉铆钉","不锈钢铆钉","铝铆钉","铁铆钉","铜铆钉","黄铜铆钉",
                "紫铜铆钉","304不锈钢铆钉","316不锈钢铆钉","半空心铆钉","子母铆钉","双面铆钉","封闭型抽芯铆钉","开口型拉钉","沉头铆钉","圆头铆钉",
                "平头铆钉","大帽沿铆钉","鼓型铆钉","双鼓拉钉","单鼓铆钉","海马钉","拉丝铆钉","结构型铆钉","钢结构铆钉","工业铆钉",
                "10B21铆钉","碳钢铆钉","镀锌铆钉","镀镍铆钉","防锈铆钉","防水铆钉","耐高温铆钉","高强度铆钉","承重铆钉","精密小铆钉",
                "2mm铆钉","3mm铆钉","4mm铆钉","5mm铆钉","6mm铆钉","8mm铆钉","10mm铆钉","微型铆钉","加长铆钉","短款铆钉",
                "箱包铆钉","服饰铆钉","鞋帽铆钉","五金铆钉","家具铆钉","汽车铆钉","电动车铆钉","机箱铆钉","门窗铆钉","厨具铆钉",
                "标牌铆钉","铭牌铆钉","广告钉","手敲铆钉","手动铆钉枪","气动铆钉枪","电动拉铆枪","铆钉枪配件","铆钉模具","铆钉定位治具",
                "彩色铝铆钉","黑色铆钉","金色铆钉","银色铆钉","彩色拉钉","装饰铆钉","皮质铆钉","撞钉","四合铆钉","固定铆钉",
                "环保铆钉","无磁铆钉","耐腐蚀铆钉","户外专用铆钉","钣金铆钉","铝板铆钉","铁板铆钉","铜板铆钉","薄板铆钉","厚板铆钉",
                "国标铆钉","非标铆钉","定制铆钉","散装铆钉","盒装铆钉","铆钉套装","铆钉垫片","垫圈铆钉","航空铆钉","机械铆钉"
            ]
        };

        // 生成关键词按钮
        function generateLinks() {
            const container = document.getElementById("linkContainer");
            if (!container) return;
            const baseUrl = isMobileDevice() ? linksConfig.mobileBase : linksConfig.pcBase;
            Object.entries(categoryKeywords).forEach(([category, keywords]) => {
                const categoryDiv = document.createElement("div");
                categoryDiv.className = "keyword-category";
                const titleElement = document.createElement("div");
                titleElement.className = "category-title";
                titleElement.textContent = category;
                categoryDiv.appendChild(titleElement);
                const buttonsDiv = document.createElement("div");
                buttonsDiv.className = "keyword-buttons";
                const uniqueKeywords = [...new Set(keywords)].filter(k => k.trim());
                uniqueKeywords.forEach(keyword => {
                    const link = document.createElement("a");
                    link.href = baseUrl + encodeURIComponent(keyword);
                    link.target = "_blank";
                    link.textContent = keyword;
                    link.className = "keyword-btn";
                    buttonsDiv.appendChild(link);
                });
                categoryDiv.appendChild(buttonsDiv);
                container.appendChild(categoryDiv);
            });
        }

        window.addEventListener('load', function() {
            // 搜索框聚焦
            const searchInput = document.querySelector('.search-input');
            if (searchInput) searchInput.focus();
            // 渲染关键词
            generateLinks();

            // 搜索表单提交事件
            const searchForm = document.getElementById('searchForm');
            searchForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const inputValue = searchInput.value.trim();
                if (!inputValue) {
                    alert('请输入搜索关键词');
                    return;
                }
                const encodedKeyword = encodeURIComponent(inputValue);
                const isMobile = isMobileDevice();
                if (isMobile) {
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = urls.mobileApp + encodedKeyword;
                    document.body.appendChild(iframe);
                    setTimeout(() => {
                        document.body.removeChild(iframe);
                        window.location.href = urls.mobileWeb + encodedKeyword;
                    }, 300);
                } else {
                    window.location.href = urls.pcWeb + encodedKeyword;
                }
            });

            // 店铺链接自动切换淘宝APP协议
            document.querySelectorAll('.app-btn').forEach(link => {
                if (isMobileDevice()) {
                    link.href = link.href.replace('https://', 'taobao://');
                }
            });
        });
    </script>

    <!-- 外部样式与脚本 -->
    <link rel="stylesheet" href="/a/js/bj.css">
    <link rel="stylesheet" href="/a/js/xhx.css">
    <link rel="stylesheet" href="/a/js/h.css">

    <script src="/a/js/ico.js"></script>
</body>
</html>
