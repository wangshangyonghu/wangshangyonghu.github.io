<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品分享</title>
    <meta name="keywords" content="网上用户商品分享,内存卡,存储卡,TF卡,SD卡,高速内存卡" />
    <style>
        body {
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .search-wrapper {
            max-width: 700px;
            margin: 20px auto;
        }
        .search-form {
            display: flex;
            height: 44px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .search-input {
            flex: 1;
            padding: 0 15px;
            border: 1px solid #ff4400;
            border-right: none;
            outline: none;
            font-size: 14px;
            border-radius: 4px 0 0 4px;
            box-sizing: border-box;
        }
        .search-btn {
            min-width: 80px;
            background-color: #ff4400;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .search-btn:hover {
            background-color: #f53f00;
        }
        .keyword-category {
            margin: 25px 0;
        }
        .category-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 600;
            border-left: 3px solid #ff4400;
            padding-left: 8px;
        }
        .keyword-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .keyword-btn {
            padding: 6px 14px;
            background-color: #fff;
            border: 1px solid #ff4400;
            color: #ff4400;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .keyword-btn:hover {
            background-color: #ff4400;
            color: #fff;
        }
        .btn-container {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 12px;
            padding: 10px;
            box-sizing: border-box;
        }
        .app-btn {
            display: inline-block;
            background-color: #e6f7ff;
            color: #1890ff;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .app-btn:hover {
            background-color: #bae7ff;
            color: #096dd9;
        }
    </style>
</head>
<body>
    <!-- 搜索框区域 -->
    <div class="search-wrapper">
        <form class="search-form" id="searchForm">
            <input type="search" class="search-input" name="q" placeholder="请输入搜索关键词（如：内存卡）" required>
            <button type="submit" class="search-btn">搜索</button>
        </form>
    </div>

    <!-- 店铺按钮容器 -->
    <div class="btn-container">
        <a href="/" target="_blank" class="app-btn"></a>
    </div>

    <!-- 内存卡关键词区域 -->
    <div style="max-width: 700px; margin: 0 auto;">
        <div id="linkContainer"></div>
    </div>

    <script>
               // 统一设备判断
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // 顶部搜索跳转链接
        const urls = {
            // mobileApp 手机端唤起淘宝APP链接
            mobileApp: "taobao://ai.m.taobao.com/search.html?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781582035%402103e876_1697_19ece907902_04ff%4001&q=",
            // mobileWeb 手机浏览器网页链接
            mobileWeb: "https://ai.m.taobao.com/search.html?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781582035%402103e876_1697_19ece907902_04ff%4001&q=",
            // pcWeb 电脑PC端网页链接
            pcWeb: "https://ai.taobao.com/search/index.htm?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781581630%400b11d4cc_15e6_19ece8a4d26_050d%4001&key="
        };

        // 关键词跳转链接
        const linksConfig = {
            // mobileBase 关键词跳转-手机唤起淘宝APP链接
            mobileBase: "taobao://ai.m.taobao.com/search.html?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781582035%402103e876_1697_19ece907902_04ff%4001&q=",
            // pcBase 关键词跳转-电脑PC端网页链接
            pcBase: "https://ai.taobao.com/search/index.htm?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401781581630%400b11d4cc_15e6_19ece8a4d26_050d%4001&key="
        };

        // 100个内存卡相关关键词
        const categoryKeywords = {
            "内存卡全品类": [
                "内存卡","存储卡","TF卡","MicroSD卡","SD卡","高速内存卡","U3内存卡","V30内存卡","V60内存卡","V90内存卡",
                "4G内存卡","8G内存卡","16G内存卡","32G内存卡","64G内存卡","128G内存卡","256G内存卡","512G内存卡","1TB内存卡","2TB内存卡",
                "行车记录仪内存卡","监控内存卡","摄像头内存卡","相机内存卡","单反SD卡","微单存储卡","无人机内存卡","运动相机内存卡","游戏机内存卡","Switch内存卡",
                "手机内存卡","平板TF卡","老人机内存卡","监控专用卡","4K录制内存卡","8K高速卡","读写100M内存卡","读写150M内存卡","读写200M内存卡","读写300M内存卡",
                "class10内存卡","U1存储卡","低温内存卡","工业级内存卡","防水内存卡","防磁内存卡","防震内存卡","大容量内存卡","迷你内存卡","标准SD大卡",
                "内存卡读卡器","二合一读卡器","USB3.0读卡器","Type-C读卡器","高速读卡器","TF卡适配器","SD卡卡套","内存卡收纳盒","内存卡保护套","内存卡标签贴",
                "闪迪内存卡","金士顿内存卡","三星内存卡","朗科内存卡","铠侠内存卡","海康内存卡","大华内存卡","东芝内存卡","雷克沙内存卡","忆捷内存卡",
                "车载内存卡","导航内存卡","音箱TF卡","录音笔内存卡","摄像头TF卡","家用监控内存卡","商铺监控内存卡","户外摄像头内存卡","全景相机内存卡","云台相机内存卡",
                "正品内存卡","原装内存卡","扩容卡检测","高速稳定内存卡","不掉速内存卡","循环录制内存卡","全天候监控卡","高清录像内存卡","数码存储卡","便携式内存卡"
            ]
        };

        // 生成关键词按钮
        function generateLinks() {
            const container = document.getElementById("linkContainer");
            if (!container) return;
            const baseUrl = isMobileDevice() ? linksConfig.mobileBase : linksConfig.pcBase;
            Object.entries(categoryKeywords).forEach(([category, keywords]) => {
                const categoryDiv = document.createElement("div");
                categoryDiv.className = "keyword-category";
                const titleElement = document.createElement("div");
                titleElement.className = "category-title";
                titleElement.textContent = category;
                categoryDiv.appendChild(titleElement);
                const buttonsDiv = document.createElement("div");
                buttonsDiv.className = "keyword-buttons";
                const uniqueKeywords = [...new Set(keywords)].filter(k => k.trim());
                uniqueKeywords.forEach(keyword => {
                    const link = document.createElement("a");
                    link.href = baseUrl + encodeURIComponent(keyword);
                    link.target = "_blank";
                    link.textContent = keyword;
                    link.className = "keyword-btn";
                    buttonsDiv.appendChild(link);
                });
                categoryDiv.appendChild(buttonsDiv);
                container.appendChild(categoryDiv);
            });
        }

        window.addEventListener('load', function() {
            // 搜索框聚焦
            const searchInput = document.querySelector('.search-input');
            if (searchInput) searchInput.focus();
            // 渲染关键词
            generateLinks();

            // 搜索表单提交事件
            const searchForm = document.getElementById('searchForm');
            searchForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const inputValue = searchInput.value.trim();
                if (!inputValue) {
                    alert('请输入搜索关键词');
                    return;
                }
                const encodedKeyword = encodeURIComponent(inputValue);
                const isMobile = isMobileDevice();
                if (isMobile) {
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = urls.mobileApp + encodedKeyword;
                    document.body.appendChild(iframe);
                    setTimeout(() => {
                        document.body.removeChild(iframe);
                        window.location.href = urls.mobileWeb + encodedKeyword;
                    }, 300);
                } else {
                    window.location.href = urls.pcWeb + encodedKeyword;
                }
            });

            // 店铺链接自动切换淘宝APP协议
            document.querySelectorAll('.app-btn').forEach(link => {
                if (isMobileDevice()) {
                    link.href = link.href.replace('https://', 'taobao://');
                }
            });
        });
    </script>

    <!-- 外部样式与脚本 -->
    <link rel="stylesheet" href="/a/js/bj.css">
    <link rel="stylesheet" href="/a/js/xhx.css">
    <link rel="stylesheet" href="/a/js/h.css">

    <script src="/a/js/ico.js"></script>
</body>
</html>
