            background-color: #ff4400;

            border: none;
            font-size: 16px;

            display: flex;

            padding: 10px;
            box-sizing: border-box;
        }
        .app-btn {
            display: inline-block;
            background-color: #e6f7ff;
            color: #1890ff;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.2s;

        .app-btn:hover {

            ]
        };

        // 生成关键词按钮
        function generateLinks() {
            const container = document.getElementById("linkContainer");
            if (!container) return;
            const baseUrl = isMobileDevice() ? linksConfig.mobileBase : linksConfig.pcBase;
            Object.entries(categoryKeywords).forEach(([category, keywords]) => {
                const categoryDiv = document.createElement("div");
                categoryDiv.className = "keyword-category";
                const titleElement = document.createElement("div");
                titleElement.className = "category-title";
                titleElement.textContent = category;
                categoryDiv.appendChild(titleElement);
                const buttonsDiv = document.createElement("div");
                buttonsDiv.className = "keyword-buttons";
                const uniqueKeywords = [...new Set(keywords)].filter(k => k.trim());
                uniqueKeywords.forEach(keyword => {
                    const link = document.createElement("a");
                    link.href = baseUrl + encodeURIComponent(keyword);
                    link.target = "_blank";
                    link.textContent = keyword;
                    link.className = "keyword-btn";
                    buttonsDiv.appendChild(link);
                });
                categoryDiv.appendChild(buttonsDiv);
                container.appendChild(categoryDiv);
            });
        }

        window.addEventListener('load', function() {
            // 搜索框聚焦
            const searchInput = document.querySelector('.search-input');
            if (searchInput) searchInput.focus();
            // 渲染关键词
            generateLinks();

            // 搜索表单提交事件
            const searchForm = document.getElementById('searchForm');
            searchForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const inputValue = searchInput.value.trim();
                if (!inputValue) {
                    alert('请输入搜索关键词');
                    return;
                }
                const encodedKeyword = encodeURIComponent(inputValue);
                const isMobile = isMobileDevice();
                if (isMobile) {
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = urls.mobileApp + encodedKeyword;
                    document.body.appendChild(iframe);
                    setTimeout(() => {
                        document.body.removeChild(iframe);
                        window.location.href = urls.mobileWeb + encodedKeyword;
                    }, 300);
                } else {
                    window.location.href = urls.pcWeb + encodedKeyword;
                }
            });

            // 店铺链接自动切换淘宝APP协议
            document.querySelectorAll('.app-btn').forEach(link => {
                if (isMobileDevice()) {
                    link.href = link.href.replace('https://', 'taobao://');
                }
            });
        });
