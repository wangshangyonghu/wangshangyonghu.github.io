    <h3>
        <span id="currentYear"></span>年虚岁属相对照表(手机版)<a href="/" target="_blank">网上用户</a>

    <!-- 年份输入区域：优化布局，适配手机触控 -->
    <div class="year-input-area">
        <label for="inputYear">输入当前年份：</label>
        <input type="number" id="inputYear" placeholder="输入年份">
        <button onclick="updateYear()">更新</button>
    </div>

    <!-- 表格：结构不变，删除出生年份行，只保留虚岁 -->
    <table>
        <tr id="zodiacHeader">
            <th style="width: 70px;">生肖</th> <!-- 固定首列宽度，避免过宽 -->

    <h3>
        <span id="currentYearFooter"></span>年虚岁属相对照表(手机版)<a href="/" target="_blank">网上用户</a>
    </h3>

    <script>
        // 1. 固定生肖顺序（按传统顺序：鼠→牛→虎→兔→龙→蛇→马→羊→猴→鸡→狗→猪）
        const baseZodiacs = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];
        
        // 2. 根据出生年份获取对应的生肖（1988年为龙年，作为基准点，确保生肖计算准确）
        function getZodiacForBirthYear(birthYear) {
            const baseYear = 1988; // 已知1988年是龙年
            const baseIndex = 4;   // 龙在baseZodiacs中的索引（baseZodiacs[4] = 龙）
            const cycle = 12;      // 生肖周期为12年
            let offset = (birthYear - baseYear) % cycle;
            if (offset < 0) offset += cycle; // 处理负数年份（如1987年）
            const index = (baseIndex + offset) % cycle;
            return baseZodiacs[index];
        }
        
        // 3. 生肖排序规则（目标年份生肖排第1列，后续按“前一年生肖”依次排列）
        function getOrderedZodiacs(targetYear) {
            const targetZodiac = getZodiacForBirthYear(targetYear); // 目标年份的生肖
            const orderedList = [];
            let currentYear = targetYear;
            
            // 生成12个生肖：第1列=目标年份生肖，第2列=目标前1年生肖，...，第12列=目标前11年生肖
            for (let i = 0; i < 12; i++) {
                orderedList.push(getZodiacForBirthYear(currentYear));
                currentYear--; // 每次向前推1年，获取前一年的生肖
            }
            return orderedList;
        }
        
        // 4. 更新生肖表头（按新排序规则渲染，目标生肖标红）
        function updateZodiacHeader(targetYear) {
            const headerRow = document.getElementById('zodiacHeader');
            // 清除现有表头（保留“生肖”列）
            while (headerRow.children.length > 1) {
                headerRow.removeChild(headerRow.lastChild);
            }
            
            const orderedZodiacs = getOrderedZodiacs(targetYear);
            const targetZodiac = getZodiacForBirthYear(targetYear);
            
            // 按排序添加表头，目标生肖（第1列）标红
            orderedZodiacs.forEach(zodiac => {
                const th = document.createElement('th');
                th.textContent = zodiac;
                // 目标年份生肖添加特殊类
                if (zodiac === targetZodiac) {
                    th.classList.add('target-zodiac');
                }
                headerRow.appendChild(th);
            });
        }
        
        // 5. 初始化表格（删除出生年份行，只保留虚岁行，功能不变）
        function initTable(year) {
            updateZodiacHeader(year); // 先更新表头
            const tableContent = document.getElementById('tableContent');
            tableContent.innerHTML = '';
            
            const orderedZodiacs = getOrderedZodiacs(year); // 排序后的12个生肖
            
            // 生成10组数据（覆盖虚岁1-120岁，每12年一组，符合生肖周期）
            for (let cycle = 0; cycle < 10; cycle++) {
                // 虚岁行（每行头部显示“虚岁”）
                const ageRow = document.createElement('tr');
                const ageHeader = document.createElement('td');
                ageHeader.textContent = '虚岁';
                ageHeader.style.backgroundColor = '#f0f0f0';
                ageRow.appendChild(ageHeader);
                
                // 为每个生肖列填充虚岁数据
                orderedZodiacs.forEach((zodiac, index) => {
                    // 虚岁计算：第1列=1+12*cycle，第2列=2+12*cycle，...，第12列=12+12*cycle
                    const currentAge = (index + 1) + (cycle * 12);
                    // 出生年份计算仅用于判断当前年份高亮，不再渲染
                    const currentBirthYear = year - currentAge + 1;
                    
                    // 虚岁单元格（蓝色显示）
                    const ageCell = document.createElement('td');
                    ageCell.textContent = currentAge;
                    ageCell.classList.add('age-cell');
                    // 当前年份对应的虚岁标红
                    if (currentBirthYear === year) {
                        ageCell.classList.add('target-year');
                    }
                    
                    ageRow.appendChild(ageCell);
                });
                
                // 只插入虚岁行，移除出生年份行
                tableContent.appendChild(ageRow);
            }
            
            // 更新页面标题和输入框显示
            document.getElementById('currentYear').textContent = year;
            document.getElementById('currentYearFooter').textContent = year;
            document.getElementById('inputYear').value = year;
        }
        
        // 6. 年份更新函数（验证输入有效性，适配手机输入）
        function updateYear() {
            const input = document.getElementById('inputYear');
            const year = parseInt(input.value, 10);
            // 验证年份有效性（排除0或负数）
            if (!isNaN(year) && year > 0) {
                initTable(year);
            } else {
                alert('请输入有效的年份（正整数）');
                // 无效输入时恢复为当前系统年份
                const currentYear = new Date().getFullYear();
                input.value = currentYear;
            }
        }
        
        // 7. 页面加载时初始化（默认显示当前系统年份）
        window.onload = function() {
            const currentYear = new Date().getFullYear();
            initTable(currentYear);
            // 验证生肖计算准确性（1988年应为龙，2026年应为马）
            console.log("1988年生肖验证: " + getZodiacForBirthYear(1988)); // 输出“龙”
            console.log("2026年生肖验证: " + getZodiacForBirthYear(2026)); // 输出“马”
        };
    </script>

虚岁完整规则（纯农历计算）   <hr/>
先来看下什么是虚岁，虚岁的定义：一出生就是一岁，然后每过一个春节就长一岁。
<hr/>
一、核心定义   <hr/>
落地即 1 岁，出生当天虚岁 = 1；   <hr/>
每逢农历正月初一（春节） 统一加一岁，不分生日先后；   <hr/>
全程只看农历年份，和公历生日、农历生日无关。   <hr/>
二、标准计算公式   <hr/>
虚岁 = 当前农历年份 − 出生当年农历年份 + 1   <hr/>
