<body>
    <div class="card-container">
        <!-- 卡片头部 -->
        <div class="card-header">
            <h1 class="card-title">太阳定方向速记卡</h1>

            <span class="card-tag">✅ 北半球通用 | 零工具秒判东西南北</span>
        </div>

        <!-- 基础直判法 -->
        <div class="method-section">
            <h2 class="method-title">🌞 基础直判法</h2>
            <div class="method-content">
                <p>上午：面太阳→前东、后西、左北、右南</p>
                <p>下午：面太阳→前西、后东、左南、右北</p>
                <p>正午：面太阳→前南、后北、左东、右西</p>
            </div>
        </div>

        <!-- 影子精准法 -->
        <div class="method-section">
            <h2 class="method-title">🕶️ 影子精准法</h2>
            <div class="method-content">
                <p>物体留影，标影子顶端 A</p>
                <p>等 1-2 分钟，标新顶端 B</p>
                <p>A→B=正东西（A 西 B 东），垂线为南北</p>
            </div>
        </div>

        <!-- 左手掌应急法 -->
        <div class="method-section">
            <h2 class="method-title">✋ 左手掌应急法</h2>
            <div class="method-content">
                <p>左手掌心向上，大拇指朝太阳→四指弯曲方向 = 正南</p>
            </div>
        </div>

        <!-- 手表速判法 -->
        <div class="method-section">
            <h2 class="method-title">⌚ 手表速判法（应急升级）</h2>
            <div class="method-content">
                <p>时针对准太阳，时针与 12 点刻度的角平分线 = 正南</p>
            </div>
        </div>

        <!-- 小提示 -->
        <div class="tip-section">
            <div class="tip-title">⚠️ 小提示</div>
            <p>南半球方向完全相反（正午太阳在正北）</p>
        </div>
    </div>
