客人进屋换拖鞋看似卫生，实则不卫生，其因有三

住在干净整洁的楼房小区，大家也都很讲究品味，注重卫生。客人来了，进门都要先换拖鞋，这样方显得文明、高雅！

其实，细想想，这种做法是很不妥的，也是极不可取的！

一、散发臭气。来人，本来是穿着鞋的，换了拖鞋，裸露的脚和袜子臭不臭？有的经常洗洗脚、洗洗袜，还好；有的多少天不洗，脱下鞋，那臭气扑面而来！我们自家人互不嫌弃，可外来人的脚臭就很难承受！如果来三四个人，那几股臭气一起散发，加之客厅空间狭小，那种气味，既刺鼻又恶心，让人难以忍受！

二、一双鞋多穿，易传播病菌。真正讲究的人，大都不让别人穿自己的鞋，也不愿意去穿别人的鞋。可准备让客人穿的这些拖鞋，是公用的，你穿穿、他穿穿，乱穿一气，实在不妥。如有爱干净的或有洁癖的人来作客，让他（她）换那双公用拖鞋，会十分尴尬——不换吧，违逆主人家的规矩；换吧，又嫌弃别人穿过的鞋脏，满心不情愿，心里格外别扭！更重要的是，公用拖鞋极易传播脚气、灰指甲等脚部真菌，看似干净，实则暗藏诸多健康隐患。

三、脱过鞋不洗手，带来二次污染。进门换拖鞋，首先要脱鞋。有的鞋抬脚一蹬就掉，有的却必须用手去脱，甚至两只都要用手。可很多人用手脱完鞋后，根本不洗手，就直接和主人、其他客人互相握手、让烟、让水，甚至坐下喝酒、吃饭。想一想，这双接触过脏鞋子的手，带着各种细菌，直接参与社交和用餐，何其不卫生！

除此之外，客人进屋换拖鞋还有几处弊端不容忽视：

四、让客人尴尬拘束，失去自在感。有的人袜子破损、脚型不佳，或是本身就介意在他人面前脱鞋，进门必须换鞋会让其浑身不自在，原本轻松愉快的做客氛围，也会变得拘谨压抑，违背了主人招待客人的初衷。

五、秋冬季节易受凉伤身。天气寒冷时，室内地面冰凉，客人脱鞋后，脚部直接接触拖鞋和地板，老人、小孩以及体质较弱的人，很容易受凉，进而引发感冒、肠胃不适等问题，看似讲卫生，实则伤害了身体健康。

六、突发情况极为不便。若遇家中急事、火灾等险情需要立刻出门，众人都光着脚或穿着拖鞋，慌乱中找鞋、穿鞋，不仅耽误宝贵时间，还可能因拖鞋不合脚、地面湿滑等引发安全事故。

七、家用拖鞋清洁难及时到位。多数家庭并不会在每批客人走后，都及时对公用拖鞋进行清洗、消毒，长期放置在门口的拖鞋，会落灰、受潮、滋生细菌和霉菌，久而久之，拖鞋内部的脏污程度，往往比室外的鞋底还要严重。

八、拖鞋尺码不合，易造成不便与损伤。家用客人拖鞋多为均码，而客人脚型大小不一，有的穿偏大易打滑摔倒，有的穿偏小挤脚不适，尤其老人和小孩，长时间穿着不合脚的拖鞋，还可能损伤脚部，看似贴心，实则暗藏不便与安全隐患。

以上所言，本人不否定来客进门换拖鞋的良好初衷，但这种看似能营造良好环境的做法，本人认为，不但没有营造出“良好的环境”，反而造成了高强度、高浓度的“污染环境”！
