“病从口入” 是一句流传甚广的民间俗语，核心意思是许多疾病的发生与饮食卫生、饮食习惯或摄入的食物本身密切相关。它深刻揭示了饮食与健康之间的紧密联系，至今仍是指导人们注重饮食健康的重要原则。
一、“病从口入” 的常见原因
饮食卫生问题
食物被细菌、病毒、寄生虫等污染：比如食用未煮熟的肉类（可能含弓形虫、绦虫）、变质的饭菜（可能滋生沙门氏菌、大肠杆菌），或饮用被污染的水源，都可能引发急性肠胃炎、食物中毒等。
手部或餐具不洁：饭前不洗手、餐具未彻底消毒，会导致病菌通过手或餐具进入口腔，增加感染风险（如手足口病、诺如病毒感染）。
饮食习惯不当
暴饮暴食或过度节食：前者可能引发消化不良、急性胰腺炎，后者可能导致营养不良、肠胃功能紊乱。
长期摄入高油、高盐、高糖食物：可能诱发肥胖、高血压、糖尿病、脂肪肝等慢性疾病。
饮食不规律：比如长期不吃早餐，可能增加胆结石、胃溃疡的发病几率。
食物本身的风险
食用有毒食物：如未煮熟的豆角（含皂素）、发芽的土豆（含龙葵素）、野生毒蘑菇等，可能直接导致中毒。
食物过敏或不耐受：部分人对海鲜、牛奶、坚果等食物过敏，摄入后可能出现皮疹、呼吸困难等过敏反应；乳糖不耐受者饮用牛奶后会出现腹泻等不适。
二、如何预防 “病从口入”
注意饮食卫生
生熟食物分开处理，避免交叉污染；肉类、海鲜等彻底煮熟后再食用。
饭前便后洗手，餐具定期消毒，选择正规渠道购买食材，避免食用变质食物。
养成良好饮食习惯
三餐规律，定量进食，避免暴饮暴食或节食。
均衡饮食，减少高油、高盐、高糖食物的摄入，多吃新鲜蔬果、全谷物等。
警惕食物风险
不随意食用野生植物、蘑菇等不熟悉的食物；购买包装食品时注意生产日期和保质期。
明确自身过敏食物，避免误食；对乳糖不耐受等情况，选择替代食物（如舒化奶）。
“病从口入” 的本质是提醒人们重视饮食对健康的影响。通过科学饮食、注重卫生，能有效降低多种疾病的发生风险，这也是 “治未病” 理念的重要体现。
