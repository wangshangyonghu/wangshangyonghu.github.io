    <title>多行输入框一作业本横线输入框一网上用户</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            padding: 15px;
            background: #fffef8;
        }
        /* 作业本横线样式输入框 */
        .line-input {
            width: 100%;
            height: 36px;
            margin-bottom: 14px;
            border: none;
            border-bottom: 1.5px solid #333;
            background: transparent;
            font-size: 18px;
            padding: 0 4px;
            outline: none;
        }
        .line-input:focus {
            border-bottom-color: #0066cc;
        }
    </style>

<script>
// 本地缓存读取
const inputs = document.querySelectorAll('.line-input');
let saveData = JSON.parse(localStorage.getItem('inputCache') || '[]');

// 页面加载回填文字
inputs.forEach(inp => {
    let idx = Number(inp.dataset.index);
    if (saveData[idx] !== undefined) {
        inp.value = saveData[idx];
    }
})

// 实时保存输入内容
document.body.addEventListener('input', function(e) {
    if (e.target.classList.contains('line-input')) {
        let idx = Number(e.target.dataset.index);
        saveData[idx] = e.target.value;
        localStorage.setItem('inputCache', JSON.stringify(saveData));
    }
})
</script>
