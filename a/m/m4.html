<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网上用户</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            padding: 20px;
        }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        #urlInput {
            flex: 1;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #visitBtn {
            padding: 8px 16px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #iframeBox {
            width: 100%;
            height: calc(100vh - 80px);
            border: 0;
        }
    </style>
</head>
<body>
    <div class="search-box">
        <input type="text" id="urlInput" placeholder="请输入网址，例：https://xxx.com">
        <button id="visitBtn">访问</button>
    </div>
    <iframe id="iframeBox" src="/"></iframe>

    <script>
        const input = document.getElementById('urlInput');
        const btn = document.getElementById('visitBtn');
        const iframe = document.getElementById('iframeBox');

        btn.onclick = function () {
            let url = input.value.trim();
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            iframe.src = url;
        }

        input.onkeydown = function (e) {
            if (e.key === 'Enter') {
                btn.click();
            }
        }
    </script>


<link rel="stylesheet" href="/a/js/bj.css"><!--全局页面样式-->
<link rel="stylesheet" href="/a/js/xhx.css"><!--无下划线-->

<!-- 页脚脚本 放这里最完美 --><script src="/a/js/ico.js"></script>

</body>
</html>
