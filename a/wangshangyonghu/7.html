<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多行计算器一网上用户一多行算式自动计算器</title>

<style>
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body{
    font-family: system-ui, sans-serif;
    padding: 20px 15px;
}
.wrap{
    width: 100%;
    max-width: 450px;
    margin: 0 auto;
    border: 1px solid #222;
    padding: 12px;
}
.line{
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
    border-bottom: 1px solid #666;
}
.line input{
    flex: 1;
    margin-right: 15px;
    border: none;
    font-size: 18px;
    outline: 0;
    padding: 2px 0;
    background: transparent;
    white-space: nowrap;
    overflow: hidden;
}
.num{
    white-space: nowrap;
}
.total{
    margin-top: 8px;
    font-size: 22px;
    font-weight: bold;
}
.bottom-title{
    text-align: center;
    font-size: 28px;
    margin-top: 25px;
}
#clearBtn{
    width: 100%;
    margin-top:15px;
    padding:10px;
    font-size:18px;
    background:#f44336;
    color:#fff;
    border:none;
    border-radius:4px;
}
</style>
</head>
<body>
<div class="wrap">
    <div class="line">
        <input class="exp">
        <span class="num">0</span>
    </div>
    <div class="line">
        <input class="exp">
        <span class="num">0</span>
    </div>
    <div class="line">
        <input class="exp">
        <span class="num">0</span>
    </div>
    <div class="line">
        <input class="exp">
        <span class="num">0</span>
    </div>
    <div class="line">
        <input class="exp">
        <span class="num">0</span>
    </div>
    <div class="line">
        <input class="exp">
        <span class="num">0</span>
    </div>
    <div class="line">
        <input class="exp">
        <span class="num">0</span>
    </div>
    <div class="line">
        <input class="exp">
        <span class="num">0</span>
    </div>

    <div class="total">合计:<span id="sum">0</span></div>
    <button id="clearBtn">清空所有数据</button>
</div>

<div class="bottom-title">输入数字带+-*/%自动计算</div>

<script>
function calculate(str){
    if(!str.trim()) return 0;
    str = str.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
    if(!/^[\d+\-*/.()\s]+$/.test(str)) return 0;
    try{
        return new Function('"use strict";return ('+str+')')();
    }catch{
        return 0;
    }
}

// 实时输入自动缩放
function autoFontSize(input) {
    const max = 18;
    const min = 1;
    let size = max;
    input.style.fontSize = size + "px";
    while (input.scrollWidth > input.clientWidth && size > min) {
        size -= 0.7;
        input.style.fontSize = size + "px";
    }
}

const inputs = document.querySelectorAll('.exp');
const nums = document.querySelectorAll('.num');
const totalBox = document.getElementById('sum');
const storageKey = "calcData";

function loadCache(){
    let dataStr = localStorage.getItem(storageKey);
    if(!dataStr) return;
    let arr = JSON.parse(dataStr);
    inputs.forEach((inp,idx)=>{
        if(arr[idx]!==undefined){
            inp.value = arr[idx];
            autoFontSize(inp);
        }
    })
    refresh();
}

function saveCache(){
    let arr = [];
    inputs.forEach(inp=>arr.push(inp.value));
    localStorage.setItem(storageKey, JSON.stringify(arr));
}

function refresh(){
    let total = 0;
    inputs.forEach((inp,idx)=>{
        autoFontSize(inp);
        let res = calculate(inp.value);
        nums[idx].innerText = res;
        total += res;
    })
    totalBox.innerText = total;
    saveCache();
}

document.getElementById("clearBtn").onclick = function(){
    inputs.forEach(inp=>{
        inp.value = "";
        inp.style.fontSize = "18px";
    })
    localStorage.removeItem(storageKey);
    refresh();
}

// 每输入一个字符立刻缩小字体
inputs.forEach((input, index)=>{
    input.oninput = function(){
        autoFontSize(input);
        refresh();
    };
    input.onkeydown = function(e){
        if(e.key === 'Enter'){
            e.preventDefault();
            let next = inputs[index+1];
            if(next) next.focus();
        }
    }
})

window.onload = loadCache;
</script>

<script src="/a/js/ym.js"></script>
<script src="/a/js/ico.js"></script>

</body>
</html>
