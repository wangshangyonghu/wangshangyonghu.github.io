<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俄罗斯方块</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a12;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    overflow: hidden;
    touch-action: none;
  }
  #game-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px;
  }
  #board {
    border: 3px solid #333;
    background: #111;
    box-shadow: 0 0 30px rgba(0,255,255,0.15);
    display: block;
  }
  #side {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 110px;
  }
  .panel {
    background: #1a1a2e;
    border: 2px solid #333;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
  }
  .panel h3 { margin: 0 0 6px; font-size: 10px; color: #0ff; text-transform: uppercase; letter-spacing: 1px; }
  .panel .value { color: #0f0; font-size: 16px; font-weight: bold; }
  #next-canvas { background: #0a0a12; border: 2px solid #333; display: block; margin: 0 auto; }
  #btn-start, #btn-pause {
    background: #ff006e;
    border: none;
    color: #fff;
    padding: 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
    width: 100%;
  }
  #btn-start:hover, #btn-pause:hover { background: #ff4081; }
  #btn-pause { background: #444; }
  #btn-pause:hover { background: #666; }

  /* 触控按钮区域 */
  #controls-area {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
    padding: 0 10px 20px;
    width: 100%;
    max-width: 400px;
  }
  .ctrl-btn {
    background: #1a1a2e;
    border: 2px solid #444;
    color: #fff;
    font-size: 18px;
    padding: 16px 8px;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 56px;
    transition: background 0.1s, transform 0.05s;
  }
  .ctrl-btn:active {
    background: #333;
    transform: scale(0.95);
  }
  .ctrl-btn span { font-size: 11px; color: #888; display: block; margin-top: 2px; }
  .ctrl-rotate { grid-column: 2; grid-row: 1; }
  .ctrl-left   { grid-column: 1; grid-row: 2; }
  .ctrl-down   { grid-column: 2; grid-row: 2; }
  .ctrl-right  { grid-column: 3; grid-row: 2; }
  .ctrl-drop   { grid-column: 1 / 4; grid-row: 3; background: #2a1a1a; border-color: #633; }
  .ctrl-drop:active { background: #3a2a2a; }

  #game-over-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #game-over-overlay h2 { color: #ff006e; font-size: 28px; margin-bottom: 20px; }
  #game-over-overlay p { font-size: 14px; margin: 6px 0; color: #aaa; }
  #game-over-overlay .big { color: #0f0; font-size: 20px; font-weight: bold; }
  #btn-restart {
    margin-top: 20px;
    background: #0ff;
    border: none;
    color: #000;
    padding: 14px 30px;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
  }

  @media (max-width: 480px) {
    #game-wrapper { flex-direction: column; align-items: center; gap: 6px; }
    #side { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 6px; min-width: auto; }
    .panel { min-width: 70px; padding: 6px; }
    .panel h3 { font-size: 8px; }
    .panel .value { font-size: 12px; }
    #next-canvas { width: 60px; height: 60px; }
    #btn-start, #btn-pause { padding: 8px; font-size: 10px; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="board"></canvas>
  <div id="side">
    <div class="panel">
      <h3>得分</h3>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel">
      <h3>等级</h3>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel">
      <h3>行数</h3>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel">
      <h3>下一个</h3>
      <canvas id="next-canvas" width="80" height="80"></canvas>
    </div>
    <button id="btn-start">开始游戏</button>
    <button id="btn-pause">暂停</button>
  </div>
</div>

<!-- 手机触控按钮，按键标识直接写在按钮上 -->
<div id="controls-area">
  <div class="ctrl-btn ctrl-rotate" data-action="rotate">
    ↻<span>旋转</span>
  </div>
  <div class="ctrl-btn ctrl-left" data-action="left">
    ←<span>左移</span>
  </div>
  <div class="ctrl-btn ctrl-down" data-action="down">
    ↓<span>加速</span>
  </div>
  <div class="ctrl-btn ctrl-right" data-action="right">
    →<span>右移</span>
  </div>
  <div class="ctrl-btn ctrl-drop" data-action="drop">
    ⬇ 直接落底
  </div>
</div>

<div id="game-over-overlay">
  <h2>GAME OVER</h2>
  <p>最终得分</p>
  <p class="big" id="final-score">0</p>
  <p>消除行数</p>
  <p class="big" id="final-lines">0</p>
  <button id="btn-restart">再来一局</button>
</div>

<script>
/* ========== 俄罗斯方块 - 纯原生JS，无外部依赖，无版权 ========== */

const COLS = 10;
const ROWS = 20;
let BLOCK_SIZE = 28;

const COLORS = {
  I: '#00f0f0',
  O: '#f0f000',
  T: '#a000f0',
  S: '#00f000',
  Z: '#f00000',
  J: '#0000f0',
  L: '#f0a000',
  empty: '#1a1a2e'
};

const SHAPES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]]
};

let board = [];
let currentPiece = null;
let nextPiece = null;
let score = 0;
let lines = 0;
let level = 1;
let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;
let gameLoop = null;
let isPaused = false;
let isGameOver = false;
let isRunning = false;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 20, 340);
  BLOCK_SIZE = Math.floor(maxW / COLS);
  canvas.width = BLOCK_SIZE * COLS;
  canvas.height = BLOCK_SIZE * ROWS;
  if (board.length) draw();
}

function createBoard() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function drawBlock(context, x, y, color, size) {
  context.fillStyle = color;
  context.fillRect(x * size, y * size, size - 1, size - 1);
  context.fillStyle = 'rgba(255,255,255,0.35)';
  context.fillRect(x * size, y * size, size - 1, 3);
  context.fillRect(x * size, y * size, 3, size - 1);
  context.fillStyle = 'rgba(0,0,0,0.4)';
  context.fillRect(x * size + size - 4, y * size, 3, size - 1);
  context.fillRect(x * size, y * size + size - 4, size - 1, 3);
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) {
        drawBlock(ctx, c, r, board[r][c], BLOCK_SIZE);
      } else {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
      }
    }
  }

  if (currentPiece) {
    const ghost = { ...currentPiece, y: currentPiece.y };
    while (isValidMove(ghost, 0, 1)) ghost.y++;
    ghost.shape.forEach((row, r) => {
      row.forEach((cell, c) => {
        if (cell) {
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          ctx.fillRect((ghost.x + c) * BLOCK_SIZE, (ghost.y + r) * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
        }
      });
    });

    currentPiece.shape.forEach((row, r) => {
      row.forEach((cell, c) => {
        if (cell) {
          drawBlock(ctx, currentPiece.x + c, currentPiece.y + r, currentPiece.color, BLOCK_SIZE);
        }
      });
    });
  }

  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * BLOCK_SIZE, 0);
    ctx.lineTo(i * BLOCK_SIZE, canvas.height);
    ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i * BLOCK_SIZE);
    ctx.lineTo(canvas.width, i * BLOCK_SIZE);
    ctx.stroke();
  }
}

function drawNext() {
  nextCtx.fillStyle = '#0a0a12';
  nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!nextPiece) return;
  const cellSize = 18;
  const offsetX = (4 - nextPiece.shape[0].length) / 2;
  const offsetY = (4 - nextPiece.shape.length) / 2;
  nextPiece.shape.forEach((row, r) => {
    row.forEach((cell, c) => {
      if (cell) {
        drawBlock(nextCtx, offsetX + c, offsetY + r, nextPiece.color, cellSize);
      }
    });
  });
}

function getRandomPiece() {
  const keys = Object.keys(SHAPES);
  const type = keys[Math.floor(Math.random() * keys.length)];
  return {
    shape: SHAPES[type].map(r => [...r]),
    color: COLORS[type],
    x: Math.floor((COLS - SHAPES[type][0].length) / 2),
    y: 0,
    type: type
  };
}

function isValidMove(piece, dx, dy) {
  return piece.shape.every((row, r) =>
    row.every((cell, c) => {
      if (!cell) return true;
      const nx = piece.x + c + dx;
      const ny = piece.y + r + dy;
      return nx >= 0 && nx < COLS && ny < ROWS && (ny < 0 || !board[ny][nx]);
    })
  );
}

function rotatePiece(piece) {
  const rotated = piece.shape[0].map((_, i) => piece.shape.map(row => row[i]).reverse());
  const original = piece.shape;
  piece.shape = rotated;
  const kicks = [0, -1, 1, -2, 2];
  for (const k of kicks) {
    piece.x += k;
    if (isValidMove(piece, 0, 0)) return true;
    piece.x -= k;
  }
  piece.shape = original;
  return false;
}

function lockPiece() {
  currentPiece.shape.forEach((row, r) => {
    row.forEach((cell, c) => {
      if (cell) board[currentPiece.y + r][currentPiece.x + c] = currentPiece.color;
    });
  });
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== 0)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
      cleared++;
      r++;
    }
  }
  if (cleared > 0) {
    lines += cleared;
    score += [0, 100, 300, 500, 800][cleared] * level;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(80, 1000 - (level - 1) * 80);
    updateUI();
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
}

function spawnPiece() {
  currentPiece = nextPiece || getRandomPiece();
  nextPiece = getRandomPiece();
  drawNext();
  if (!isValidMove(currentPiece, 0, 0)) gameOver();
}

function gameOver() {
  isGameOver = true;
  isRunning = false;
  cancelAnimationFrame(gameLoop);
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-lines').textContent = lines;
  document.getElementById('game-over-overlay').style.display = 'flex';
}

function reset() {
  createBoard();
  score = 0; lines = 0; level = 1;
  dropInterval = 1000;
  isGameOver = false; isPaused = false; isRunning = true;
  nextPiece = null;
  updateUI();
  document.getElementById('game-over-overlay').style.display = 'none';
  spawnPiece();
  lastTime = performance.now();
  gameLoop = requestAnimationFrame(update);
}

function update(time = 0) {
  if (!isRunning || isPaused || isGameOver) return;
  const dt = time - lastTime;
  lastTime = time;
  dropCounter += dt;

  if (dropCounter > dropInterval) {
    if (isValidMove(currentPiece, 0, 1)) {
      currentPiece.y++;
    } else {
      lockPiece();
      clearLines();
      spawnPiece();
    }
    dropCounter = 0;
  }
  draw();
  gameLoop = requestAnimationFrame(update);
}

document.addEventListener('keydown', e => {
  if (isGameOver) return;
  if (e.key === 'p' || e.key === 'P') {
    togglePause();
    return;
  }
  if (!isRunning || isPaused || !currentPiece) return;

  switch(e.key) {
    case 'ArrowLeft':  move(-1, 0); break;
    case 'ArrowRight': move(1, 0); break;
    case 'ArrowDown':  move(0, 1, true); break;
    case 'ArrowUp':    rotatePiece(currentPiece); break;
    case ' ':          hardDrop(); break;
  }
  draw();
});

function move(dx, dy, scoreIt) {
  if (isValidMove(currentPiece, dx, dy)) {
    currentPiece.x += dx;
    currentPiece.y += dy;
    if (scoreIt) { score += 1; updateUI(); }
  }
}

function hardDrop() {
  while (isValidMove(currentPiece, 0, 1)) {
    currentPiece.y++;
    score += 2;
  }
  updateUI();
}

function togglePause() {
  if (!isRunning || isGameOver) return;
  isPaused = !isPaused;
  if (!isPaused) {
    lastTime = performance.now();
    gameLoop = requestAnimationFrame(update);
  }
}

function setupTouchControls() {
  const btns = document.querySelectorAll('.ctrl-btn');
  btns.forEach(btn => {
    const action = btn.dataset.action;
    const handler = () => {
      if (!isRunning || isPaused || isGameOver || !currentPiece) return;
      switch(action) {
        case 'left':   move(-1, 0); break;
        case 'right':  move(1, 0); break;
        case 'down':   move(0, 1, true); break;
        case 'rotate': rotatePiece(currentPiece); break;
        case 'drop':   hardDrop(); break;
      }
      draw();
    };
    btn.addEventListener('touchstart', e => { e.preventDefault(); handler(); });
    btn.addEventListener('mousedown', e => { e.preventDefault(); handler(); });
  });
}

document.getElementById('btn-start').addEventListener('click', reset);
document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-restart').addEventListener('click', reset);

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
createBoard();
draw();
setupTouchControls();
</script>
</body>
</html>
