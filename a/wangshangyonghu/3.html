<title>大字体输入框一增大字体一缩小字体一通过网页按钮控制字体大小的输入框一增大字体一 缩小字体 左对齐 居中 右对齐 切换字体粗细一网上用户</title>
<meta name="keywords" content="大字体输入框一网上用户,大字体输入框,增大字体一缩小字体一通过网页按钮控制字体大小的输入框,网上用户,公平村,张先生,公平村张先生,网上用户的图片,网上用户的个人主页,网上用户的个人首页,网上用户的个人中心,网上用户的档案,艺名张先生,网民张先生,网号张先生,用户名张先生,账号张先生,客家人张先生,网名张先生,网络用户" />
<meta name="description" content="搜索:网上用户,大字体输入框一网上用户,增大字体一缩小字体一通过网页按钮控制字体大小的输入框一居中显示一增大字体一 缩小字体 左对齐 居中 右对齐 切换字体粗细" />
</head>
<body>

<!--输入框背景颜色按钮-->
<p>背景颜色:</p>
<button onclick="changeBackgroundColor('#0066ff')">蓝</button>
<button onclick="changeBackgroundColor('#ff0000')">红</button>
<button onclick="changeBackgroundColor('#ffff00')">黄</button>
<button onclick="changeBackgroundColor('#00ffff')">青</button>
<button onclick="changeBackgroundColor('#33ff00')">绿</button>
<button onclick="changeBackgroundColor('green')">绿</button>
<button onclick="changeBackgroundColor('#000000')">黑</button>
<button onclick="changeBackgroundColor('white')">白</button>
<button onclick="changeBackgroundColor('orange')">橙</button>
<button onclick="changeBackgroundColor('blue')">蓝</button>
<button onclick="changeBackgroundColor('indigo')">靛</button>
<button onclick="changeBackgroundColor('violet')">紫</button>

<br/><br/>

<!--字体颜色按钮-->
<p>字体颜色:</p>
<button onclick="changeTextColor('#0066ff')">蓝</button>
<button onclick="changeTextColor('white')">白</button>
<button onclick="changeTextColor('black')">黑</button>
<button onclick="changeTextColor('blue')">蓝</button>
<button onclick="changeTextColor('red')">红</button>
<button onclick="changeTextColor('#33ff00')">绿</button>
<button onclick="changeTextColor('green')">绿</button>
<button onclick="changeTextColor('yellow')">黄</button>
<button onclick="changeTextColor('#800080')">紫</button>

<br/><br/>

<!--字号、对齐、粗细按钮-->
<button onclick="increaseFontSize()">增大</button>
<button onclick="decreaseFontSize()">缩小</button>
<button onclick="setTextAlign('left')">左对齐</button>
<button onclick="setTextAlign('center')">居中</button>
<button onclick="setTextAlign('right')">右对齐</button>
<button onclick="toggleFontWeight()">切换粗细</button>

<br/><br/>

<textarea rows="20" id="myInput" placeholder="请输入内容"></textarea>

<script>
// 修改输入框背景色（补上缺失的函数，修复失灵问题）
function changeBackgroundColor(color) {
  var textElement = document.getElementById("myInput");
  textElement.style.backgroundColor = color;
}

// 修改文字颜色
function changeTextColor(color) {
  var textElement = document.getElementById("myInput");
  textElement.style.color = color;
}

// 对齐方式
function setTextAlign(align) {
  var textarea = document.getElementById('myInput');
  textarea.style.textAlign = align;
}

// 字体粗细切换
function toggleFontWeight() {
  var textarea = document.getElementById('myInput');
  textarea.style.fontWeight = (textarea.style.fontWeight === 'bold') ? 'normal' : 'bold';
}

// 放大字号
function increaseFontSize() {
  var textarea = document.getElementById('myInput');
  var currentSize = parseInt(window.getComputedStyle(textarea).fontSize) || 60;
  if (currentSize < 8000) {
    textarea.style.fontSize = (currentSize + 20) + 'px';
  }
}

// 缩小字号
function decreaseFontSize() {
  var textarea = document.getElementById('myInput');
  var currentSize = parseInt(window.getComputedStyle(textarea).fontSize);
  if (currentSize > 2) {
    textarea.style.fontSize = (currentSize - 20) + 'px';
  }
}
</script>

</body>
</html>
