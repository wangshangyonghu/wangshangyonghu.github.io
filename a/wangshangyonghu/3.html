<body>    
<button id="gpc234" onclick="increaseFontSize()">增大</button>
<button id="gpc234" onclick="decreaseFontSize()">缩小</button>

<button onclick="setTextAlign('left')">左对齐</button>
  <button onclick="setTextAlign('center')">居中</button>
  <button onclick="setTextAlign('right')">右对齐</button>
<button onclick="toggleFontWeight()">切换粗细</button>
<!--对齐按钮-->
<script>
    function setTextAlign(align) {
      var textarea = document.getElementById('myInput');
      textarea.style.textAlign = align;
    }

    function toggleFontWeight() {
      var textarea = document.getElementById('myInput');
      if (textarea.style.fontWeight === 'bold') {
        textarea.style.fontWeight = 'normal';
      } else {
        textarea.style.fontWeight = 'bold';
      }
    }
  </script>
<!--对齐按钮-->


<br/><br/>

     <b><textarea rows="100%" id="myInput" oninput="resizeInput()" placeholder="请输入内容"></textarea> </b>


    <script>
        function resizeInput() {
            // 可以根据需要添加输入框内容改变时的操作
        }

    function increaseFontSize() {
  var textarea = document.getElementById('myInput');
  // 加校验：获取当前值+默认兜底（避免NaN）
  var currentSize = parseInt(window.getComputedStyle(textarea).fontSize) || 60;
  // 加最大限制（可选，比如限制最大200px，避免过度放大）
  if (currentSize < 8000) { 
    textarea.style.fontSize = (currentSize + 20) + 'px';
  }
}

        function decreaseFontSize() {
            var textarea = document.getElementById('myInput');
            var currentSize = parseInt(window.getComputedStyle(textarea).fontSize);
            if (currentSize > 2) {
                textarea.style.fontSize = (currentSize - 20) + 'px';
            }
        }
    </script>
</body>
