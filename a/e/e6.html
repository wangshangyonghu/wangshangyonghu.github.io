<style>
:root {
    --primary-color: #0066FF;
    --secondary-color: #CCFFFF;
    --text-color: #333;
    --light-text: #D6D6D6;
    --border-color: #ccc;
    --btn-hover: #0055DD;
    --container-width: 1200px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", Arial, sans-serif;
}

body {
    color: var(--text-color);
    line-height: 1.6;
    padding: 20px 15px;
}

.container {
    max-width: var(--container-width);
    margin: 0 auto;
}

.search-section {
    text-align: center;
    margin-bottom: 30px;
}

#searchInput {
    width: 60%;
    min-width: 30%;
    height: 100px;
    padding: 0 15px;

    border-radius: 8px 0 0 8px;
    font-size: 18px;
    color: #333;
    outline: none;
    transition: border-color 0.3s;
}

#searchInput:focus {

}

.search-btn {
    height: 60px;
    padding: 0 25px;
    border: none;
    border-radius: 0 8px 8px 0;
    background-color: var(--primary-color);
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s;
}

.search-btn:hover {
    background-color: var(--btn-hover);
}

#result {
    margin-top: 10px;
    font-size: 16px;
    color: var(--primary-color);
    font-weight: bold;
}

.category-title {
    display: inline-block;
    background: linear-gradient(to bottom, var(--primary-color), #0099ff);
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    padding: 8px 20px;
    border-radius: 8px;
    margin-bottom: 15px;
}

.link-container {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: flex-start;
    padding: 15px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background-color: #f9f9f9;
    margin-bottom: 25px;
}

.link-btn {
    display: inline-flex;
    align-items: center;
    padding: 8px 15px;
    background-color: var(--secondary-color);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: var(--primary-color);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.3s;
    cursor: pointer;
}

.link-btn:hover {
    background-color: var(--primary-color);
    color: #fff;
    border-color: var(--primary-color);

@media (max-width: 768px) {

<script>
const chineseNumber = ["零", "壹", "贰", "叁", "肆", "伍", "陆", "柒", "捌", "玖"];
const chineseUnit = ["", "拾", "佰", "仟", "万", "拾", "佰", "仟", "亿", "拾", "佰", "仟"];

function convertToChinese(num) {
    if (!num || isNaN(num)) return "零元整";
    let numStr = num.toString().trim();
    let integerPart = "0";
    let decimalPart = "00";
    if (numStr.includes('.')) {
        const parts = numStr.split('.');
        integerPart = parts[0] || "0";
        decimalPart = (parts[1] || "").padEnd(2, '0').substring(0, 2);
    } else {
        integerPart = numStr;
    }
    if (integerPart === "0" && decimalPart === "00") {
        return "零元整";
    }
    let integerResult = "";
    let zeroCount = 0;
    for (let i = 0; i < integerPart.length; i++) {
        let digit = parseInt(integerPart[i]);
        let unitPos = integerPart.length - 1 - i;
        if (digit === 0) {
            zeroCount++;
        } else {
            if (zeroCount > 0) {
                integerResult += "零";
                zeroCount = 0;
            }
            integerResult += chineseNumber[digit] + chineseUnit[unitPos];
        }
    }
    integerResult = integerResult.replace(/零+$/, "");
    let result = "";
    if (integerResult) {
        result += integerResult + "元";
    } else if (decimalPart !== "00") {
        result += "零元";
    }
    const jiao = parseInt(decimalPart[0]);
    const fen = parseInt(decimalPart[1]);
    if (jiao === 0 && fen === 0) {
        result += "整";
    } else {
        if (jiao !== 0) {
            result += chineseNumber[jiao] + "角";
        } else if (integerResult && fen !== 0) {
            result += "零";
        }
        if (fen !== 0) {
            result += chineseNumber[fen] + "分";
        }
    }
    return result || "零元整";
}

function calculateMathExpression(expression) {
    const validChars = /^[0-9+\-*/%().\s]+$/;
    if (!validChars.test(expression)) return null;
    const sanitized = expression.replace(/[^0-9+\-*/%().\s]/g, '');
    try {
        const processed = sanitized.replace(/(\d+(\.\d+)?)%/g, '($1/100)');
        const result = eval(processed);
        if (isNaN(result) || !isFinite(result)) return null;
        return Number.isInteger(result) ? result : parseFloat(result.toFixed(6));
    } catch (e) {
        return null;
    }
}

function handleKeyUp(event) {
    const inputValue = document.getElementById("searchInput").value.trim();
    const resultElement = document.getElementById("result");
    resultElement.innerHTML = "";
    if (inputValue === "") return;
    const mathResult = calculateMathExpression(inputValue);
    if (mathResult !== null) {
        resultElement.innerHTML = `<div style="color: #0066cc; font-weight: bold;">${inputValue} = ${mathResult}</div>`;
        resultElement.innerHTML += `<div style="color: #e67e22; margin-top: 5px;">${mathResult} = ${convertToChinese(mathResult)}</div>`;
    } else if (!isNaN(Number(inputValue)) && inputValue !== "") {
        resultElement.innerHTML = `<div style="color: #0066cc; font-weight: bold;">${inputValue} = ${inputValue}</div>`;
        resultElement.innerHTML += `<div style="color: #e67e22; margin-top: 5px;">${inputValue} = ${convertToChinese(inputValue)}</div>`;
    }
    if (event.keyCode === 13 || event.key === 'Enter') {
        document.getElementById("mainSearchBtn").click();
    }
}

const searchEngines = {
    baidu: "https://www.baidu.com/s?wd=",
    bing: "https://www.bing.com/search?q=",
    toutiao: "https://so.toutiao.com/search?keyword=",
    weixin: "https://weixin.sogou.com/weixinwap?type=2&ie=utf8&_sug_=n&_sug_type_=-1&s_from=input&query=",
    360: "https://www.so.com/s?q=",
    douyin: "https://www.douyin.com/search/",
    sogou: "https://www.sogou.com/web?query=",
    yandex: "https://yandex.com/search/?text=",
    "3dsource": "http://lib.3dsource.cn/#/searchResult?searchKeyword=",
    "baidu-mp3": "https://music.163.com/#/search/m/?s=",
    "baidu-video": "https://m.baidu.com/sf/vsearch?pd=video&tn=vsearch&sa=vs_tab&lid=7194865086898977692&ms=1&atn=index&word=",
    "baidu-news": "https://m.baidu.com/sf/vsearch?pd=realtime&tn=vsearch&sa=vs_tab&lid=7292861491581609769&ms=1&atn=index&word=",
    "taobao": "taobao://ai.m.taobao.com/search.html?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401760747217%400b8f386d_1236_199f4b661e8_057f%4001&q=",
    "bing-image": "https://cn.bing.com/images/search?q=",
    "baidu-image": "https://www.baidu.com/sf/vsearch?pd=image_content&tn=vsearch&sa=vs_tab&lid=6551618409030760268&ms=1&from=844b&atn=page&fr=tab&word=",
    "sogou-image": "https://pic.sogou.com/pic/searchList.jsp?uID=&v=5&statref=index_form_1&spver=0&rcer=&keyword=",
    "360-image": "https://image.so.com/i?q=",
    "taobao-image": "taobao://ai.m.taobao.com/search.html?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401760747217%400b8f386d_1236_199f4b661e8_057f%4001&q=",
    "baidu-trans": "https://fanyi.baidu.com/m/trans?from=zh&to=en&query=",
    "sogou-trans": "https://fanyi.sogou.com/text?keyword=",
    "bing-trans": "https://cn.bing.com/translator/?ref&text="
};

document.getElementById("mainSearchBtn").addEventListener("click", () => {
    const keyword = document.getElementById("searchInput").value;
    if (keyword) {
        window.open(searchEngines.bing + encodeURIComponent(keyword), "_blank");
    }
});

document.querySelectorAll(".link-btn[data-engine]").forEach(btn => {
    btn.addEventListener("click", () => {
        const engine = btn.getAttribute("data-engine");
        const keyword = document.getElementById("searchInput").value;
        const url = searchEngines[engine] + encodeURIComponent(keyword || "");
        window.open(url, "_blank");
    });
});
</script>
