:root {

body {

.search-btn:hover {

}

<script>
    const chineseNumber = ["零", "壹", "贰", "叁", "肆", "伍", "陆", "柒", "捌", "玖"];
    const chineseUnit = ["", "拾", "佰", "仟", "万", "拾", "佰", "仟", "亿", "拾", "佰", "仟"];

    function convertToChinese(num) {
        if (!num || isNaN(num)) return "零元整";
        let number = parseFloat(num);
        if (number === 0) return "零元整";
        let integerPart = Math.floor(number);
        let decimalPart = Math.round((number - integerPart) * 100);
        let jiao = Math.floor(decimalPart / 10);
        let fen = decimalPart % 10;
        let integerStr = integerPart.toString();
        let result = "";
        let zeroFlag = false;
        let unitIndex = integerStr.length - 1;
        for (let i = 0; i < integerStr.length; i++) {
            let digit = parseInt(integerStr[i]);
            if (digit === 0) {
                zeroFlag = true;
            } else {
                if (zeroFlag) {
                    result += "零";
                    zeroFlag = false;
                }
                result += chineseNumber[digit] + chineseUnit[unitIndex - i];
            }
        }
        if (result) {
            result += "元";
        } else {
            result = "零元";
        }
        if (jiao > 0) {
            result += chineseNumber[jiao] + "角";
        } else if (jiao === 0 && fen > 0 && integerPart > 0) {
            result += "零";
        }
        if (fen > 0) {
            result += chineseNumber[fen] + "分";
        } else if (jiao === 0 && fen === 0) {
            result += "整";
        }
        result = result.replace(/^零元零/, '零');
        result = result.replace(/^零元/, '');
        return result || "零元整";
    }

    function processPercentage(expr) {
        return expr.replace(/(\d+(\.\d+)?)%/g, (match, num) => {
            return (parseFloat(num) / 100).toString();
        });
    }

    function calculateExpression(expr) {
        const validPattern = /^[\d+\-*/.()\s%]+$/;
        if (!validPattern.test(expr)) {
            return null;
        }
        try {
            const processedExpr = processPercentage(expr);
            const func = new Function(`return ${processedExpr};`);
            const result = func();
            if (isNaN(result) || !isFinite(result)) {
                return null;
            }
            return result;
        } catch (e) {
            return null;
        }
    }

    function handleKeyUp(event) {
        const inputValue = document.getElementById("searchInput").value.trim();
        const resultElement = document.getElementById("result");
        resultElement.innerHTML = "";
        if (inputValue === "") {
            return;
        }
        const calculationResult = calculateExpression(inputValue);
        if (calculationResult !== null && !isNaN(calculationResult)) {
            const formattedExpr = inputValue.replace(/\s+/g, '');
            const displayResult = Number.isInteger(calculationResult) ? calculationResult : parseFloat(calculationResult.toFixed(6));
            let resultHtml = `<div style="color: #0066cc; font-weight: bold;">${formattedExpr} = ${displayResult}</div>`;
            const chineseResult = convertToChinese(displayResult);
            resultHtml += `<div style="color: #e67e22; margin-top: 5px;">${displayResult} = ${chineseResult}</div>`;
            resultElement.innerHTML = resultHtml;
        } else if (!isNaN(inputValue.replace(/%/g, '')) && inputValue !== "") {
            let numValue = inputValue;
            if (numValue.includes('%')) {
                numValue = processPercentage(numValue);
            }
            const num = parseFloat(numValue);
            if (!isNaN(num)) {
                const chineseResult = convertToChinese(num);
                resultElement.innerHTML = `<div style="color: #e67e22; font-weight: bold;">${inputValue} = ${chineseResult}</div>`;
            }
        }
        if (event.keyCode === 13 || event.key === 'Enter') {
            document.getElementById("mainSearchBtn").click();
        }
    }

    const searchEngines = {
        baidu: "https://www.baidu.com/s?wd=",
        bing: "https://www.bing.com/search?q=",
        toutiao: "https://so.toutiao.com/search?dvpf=pc&source=input&keyword=",
        weixin: "https://weixin.sogou.com/weixin?type=2&s_from=input&query=",
        360: "https://www.so.com/s?q=",
        douyin: "https://www.douyin.com/search/",
        sogou: "https://www.sogou.com/web?query=",
        yandex: "https://yandex.com/search/?text=",
        "3dsource": "http://lib.3dsource.cn/#/searchResult?searchKeyword=",
        "baidu-mp3": "https://music.163.com/#/search/m/?s=",
        "baidu-video": "https://www.baidu.com/sf/vsearch?pd=video&tn=vsearch&ie=utf-8&wd=",
        "baidu-news": "https://news.baidu.com/ns?word=",
        "bing-image": "https://cn.bing.com/images/search?q=",
        "baidu-image": "https://image.baidu.com/search/index?word=",
        "sogou-image": "https://pic.sogou.com/pics?query=",
        "360-image": "https://image.so.com/i?q=",
        "taobao-image": "https://ai.taobao.com/search/index.htm?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401760747866%4021048906_131d_199f4c04abe_0551%4001&key=",
        "baidu-trans": "https://fanyi.baidu.com/mtpe-individual/multimodal?query=",
        "sogou-trans": "https://fanyi.sogou.com/text?keyword=",
        "bing-trans": "https://cn.bing.com/translator/?ref&text=",
        "taobao": "https://ai.taobao.com/search/index.htm?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401760747866%4021048906_131d_199f4c04abe_0551%4001&key=",
        "atb": "https://ai.taobao.com/search/index.htm?&pid=mm_5518923388_3058500304_116069600003&union_lens=lensId%3APUB%401760747866%4021048906_131d_199f4c04abe_0551%4001&key=",
        "tb": "https://s.taobao.com/search?page=1&pvid=d0f2ec2810bcec0d5a16d5283ce59f67&q=",
        "yp": "https://www.xiaomiyoupin.com/search?keyword=",
        "dd": "https://search.dangdang.com/?key="
    };

    document.getElementById("mainSearchBtn").addEventListener("click", () => {
        const keyword = document.getElementById("searchInput").value;
        if (keyword) {
            window.open(searchEngines.bing + encodeURIComponent(keyword), "_blank");
        }
    });

    document.querySelectorAll(".link-btn[data-engine]").forEach(btn => {
        btn.addEventListener("click", () => {
            const engine = btn.getAttribute("data-engine");
            const keyword = document.getElementById("searchInput").value;
            const url = searchEngines[engine] + encodeURIComponent(keyword || "");
            window.open(url, "_blank");
        });
    });
</script>
