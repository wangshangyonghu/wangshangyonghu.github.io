<style>
/* 定义全局CSS变量，方便统一管理颜色、宽度等样式属性 */
:root {
    --primary-color: #0066FF; /* 主色调：蓝色 */
    --secondary-color: #CCFFFF; /* 辅助色：浅青色 */
    --text-color: #333; /* 主要文本颜色：深灰色 */
    --light-text: #D6D6D6; /* 次要文本颜色：浅灰色 */
    --border-color: #ccc; /* 边框颜色：灰色 */
    --btn-hover: #0055DD; /* 按钮 hover 状态颜色：深蓝色 */
    --container-width: 1200px; /* 容器最大宽度 */
}



/* 页面主体样式：设置文本颜色、行高、内边距（左侧预留导航宽度） */
body {
    color: var(--text-color); /* 使用文本颜色变量 */
    line-height: 1.6; /* 行高：提升可读性 */
    padding: 20px 15px; /* 上下内边距20px，左右15px */
    padding-left: 120px; /* 左侧预留120px给固定导航，避免内容被遮挡 */
}

/* 容器样式：限制最大宽度并居中显示 */
.container {
    max-width: var(--container-width); /* 使用容器宽度变量 */
    margin: 0 auto; /* 水平居中 */
}




/* 分类标题样式：设置背景渐变、颜色、内边距等 */
.category-title {
    display: inline-block; /* 行内块级元素 */
    background: linear-gradient(to bottom, var(--primary-color), #0099ff); /* 背景渐变：主色调到亮蓝色 */
    color: #fff; /* 文本颜色白色 */
    font-size: 18px; /* 字体大小18px */
    font-weight: bold; /* 字体加粗 */
    padding: 8px 20px; /* 内边距：上下8px，左右20px */
    border-radius: 8px; /* 圆角8px */
    margin-bottom: 15px; /* 底部外边距15px */
}

/* 链接容器样式：弹性布局，支持换行，设置内边距和背景色 */
.link-container {
    display: flex; /* 弹性布局 */
    flex-wrap: wrap; /* 超出换行 */
    gap: 12px; /* 子元素间距12px */
    justify-content: flex-start; /* 左对齐 */
    padding: 15px; /* 内边距15px */
    border: 1px solid var(--border-color); /* 边框：1px实线边框色 */
    border-radius: 8px; /* 圆角8px */
    background-color: #f9f9f9; /* 背景色浅灰色 */
    margin-bottom: 25px; /* 底部外边距25px */
}

/* 链接按钮样式：设置内边距、背景色、边框等 */
.link-btn {
    display: inline-flex; /* 行内弹性布局 */
    align-items: center; /* 垂直居中 */
    padding: 8px 15px; /* 内边距：上下8px，左右15px */
    background-color: var(--secondary-color); /* 背景色使用辅助色 */
    border: 1px solid var(--border-color); /* 边框：1px实线边框色 */
    border-radius: 6px; /* 圆角6px */
    color: var(--primary-color); /* 文本颜色使用主色调 */
    text-decoration: none; /* 去除下划线 */
    font-size: 15px; /* 字体大小15px */
    font-weight: 500; /* 字体中等加粗 */
    transition: all 0.3s; /* 所有属性过渡效果0.3s */
    cursor: pointer; /* 鼠标指针变为手型 */
}

/* 链接按钮 hover 状态：改变背景色、文本色和边框色 */
.link-btn:hover {
    background-color: var(--primary-color); /* 背景色变为主色调 */
    color: #fff; /* 文本颜色变为白色 */
    border-color: var(--primary-color); /* 边框色变为主色调 */
}





/* 响应式布局：屏幕宽度小于768px时的样式调整 */
@media (max-width: 768px) {
    /* 页面主体：取消左侧预留导航宽度 */
    body {
        padding-left: 15px;
    }



    /* 搜索输入框：调整宽度、高度和字体大小 */
    #searchInput {
        width: 75%; /* 宽度占75% */
        height: 50px; /* 高度50px */
        font-size: 16px; /* 字体大小16px */
    }

    /* 搜索按钮：调整高度、内边距和字体大小 */
    .search-btn {
        height: 50px; /* 高度50px */
        padding: 0 18px; /* 左右内边距18px */
        font-size: 16px; /* 字体大小16px */
    }


  
</style>

<style>
/* 返回顶部按钮样式：固定定位在右下角，圆形设计 */
#backToTop {
    position: fixed; /* 固定定位 */
    bottom: 30px; /* 距离底部30px */
    right: 30px; /* 距离右侧30px */
    width: 50px; /* 宽度50px */
    height: 50px; /* 高度50px */
    border: none; /* 去除边框 */
    border-radius: 50%; /* 圆形按钮 */
    background-color: var(--primary-color); /* 背景色使用主色调 */
    color: #fff; /* 文本颜色白色 */
    font-size: 24px; /* 字体大小24px */
    cursor: pointer; /* 鼠标指针变为手型 */
    box-shadow: 0 3px 10px rgba(0,0,0,0.2); /* 底部阴影效果 */
    transition: background-color 0.3s; /* 背景色过渡效果0.3s */
    display: none; /* 默认隐藏 */
}
/* 返回顶部按钮 hover 状态：改变背景色 */
#backToTop:hover {
    background-color: var(--btn-hover); /* hover时背景色变为按钮hover色 */
}
</style>
