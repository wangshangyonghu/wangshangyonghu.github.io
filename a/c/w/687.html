Windows远程桌面

被控端:
1.启用远程桌面：按下 Windows + I 键打开设置，找到 “远程桌面” 选项，将切换开关选为 “打开”。
获取被控端 IP 地址和用户名：在被控端电脑上，按下 Windows + R 键，输入 “cmd” 后回车，在命令提示符中输入 “ipconfig”，按回车可获得 IP 地址；
输入 “net user”，可查看本地用户名。

2.如果 Windows 11 本地登录账号没有密码，要实现远程连接，需要修改本地安全策略，具体步骤如下：
修改本地安全策略：按下 Windows+R 键，输入 “gpedit.msc” 打开本地组策略编辑器。导航到 “计算机配置”->“Windows 设置”->“安全设置”->“本地策略”->“安全选项”。找到 “账户：使用空白密码的本地账户只允许控制台登录” 策略，双击打开并选择 “已禁用”。




控制端:
打开远程桌面连接：在控制端电脑上，按下 Windows + R 键，输入 “mstsc” 并按回车，打开远程桌面连接应用。
输入远程电脑信息：在 “计算机” 输入框中，输入远程电脑的 IP 地址；在 “用户名” 输入框中，输入被控端的本地用户名，点击 “连接”。
输入密码并连接：在弹出的窗口中，输入被控端本地账号的登录密码，点击 “确定”，即可建立远程连接。





Windows 11 远程控制有多种方法，以下是详细介绍：
使用系统自带的远程桌面功能（仅限专业版和企业版）：
启用远程桌面：按下 Windows + I 键打开设置，找到 “远程桌面” 选项，将切换开关选为 “打开”。
配置远程桌面连接：获取远程电脑的 IP 地址，通过搜索工具、运行命令 “mstsc” 或 Windows 终端等方式打开远程桌面连接，输入远程电脑的 IP 地址，点击 “连接”，连接成功后输入远程电脑的登录用户名和密码，即可开始远程操控。
使用第三方远程桌面软件（如 AnyViewer）：
同一网络远程控制：在两台电脑上安装并运行 AnyViewer，创建一个 AnyViewer 帐号并在两台电脑上登录同一帐号。在本地电脑上单击 “设备”，选择要控制的电脑，然后单击 “远程控制” 即可。
不同网络远程控制：同样在两台电脑上安装并运行 AnyViewer，登录同一帐号。可通过发送控制请求或输入安全码来远程控制另一台电脑。
使用快速助手：开启 Windows 11 自带的快速助手，点击 “帮助某人”，会生成一串安全码。在需要被控制的电脑上输入该代码，对方就可以远程连接并进行实时标记和聊天沟通。


如果 Windows 11 使用本地账号登录，可通过系统自带的远程桌面功能进行远程连接，步骤如下：
启用远程桌面：按下 Windows + I 键打开设置，选择 “系统”，在右侧窗格找到并点击 “远程桌面”，将右侧的按钮滑动至开启状态。
添加远程用户：点击 “远程桌面用户”，添加允许进行远程连接的本地用户账户。
获取被控端 IP 地址和用户名：在被控端电脑上，按下 Windows + R 键，输入 “cmd” 后回车，在命令提示符中输入 “ipconfig”，按回车可获得 IP 地址；输入 “net user”，可查看本地用户名。
打开远程桌面连接：在控制端电脑上，按下 Windows + R 键，输入 “mstsc” 并按回车，打开远程桌面连接应用。
输入远程电脑信息：在 “计算机” 输入框中，输入远程电脑的 IP 地址；在 “用户名” 输入框中，输入被控端的本地用户名，点击 “连接”。
输入密码并连接：在弹出的窗口中，输入被控端本地账号的登录密码，点击 “确定”，即可建立远程连接。


设置你想要连接以使其允许远程连接的电脑：

确保拥有 Windows 专业版。 若要检查这一点，请选择“开始”，然后打开“设置”。 然后，在“系统”下，选择“关于”，并在“Windows 规范”下，查找“版本”。 有关如何获取 Windows 专业版的信息，请转到 将 Windows 家庭版升级到 Windows 专业版。

准备就绪后，选择“开始”，然后打开“设置”。 然后，在“系统”下，选择“远程桌面”，将“远程桌面”设置为“打开”，然后选择“确认”。

记下“电脑名称”下的这台电脑的名称。 稍后将需要使用此名称。

使用远程桌面连接到你设置的电脑：

在本地 Windows 电脑上： 在任务栏的搜索框中，键入“远程桌面连接”，然后选择“远程桌面连接”。 在“远程桌面连接”中，键入你想要连接的电脑的名称（从步骤 1），然后选择“连接”。

在 macOS 或 iOS 设备上： 打开 Microsoft Store 和 Apple App Store) 免费提供的Windows App (，并添加要连接到步骤 1) (的电脑的名称。  选择你添加的远程电脑名称，然后等待连接完成。

在 Android 设备上： 从 Google Play 商店) 打开“ 远程桌面”应用 (，并添加要连接到步骤 1) (的电脑的名称。  选择你添加的远程电脑名称，然后等待连接完成。





如果 Windows 11 本地登录账号没有密码，要实现远程连接，需要修改本地安全策略，具体步骤如下：
启用远程桌面功能：确保 Windows 11 是专业版及以上版本，因为家庭版默认不支持远程桌面功能。通过 “设置”->“系统”->“关于” 检查 Windows 版本。若版本支持，在 “设置”->“系统”->“远程桌面” 中，将远程桌面开关开启。
修改本地安全策略：按下 Windows+R 键，输入 “gpedit.msc” 打开本地组策略编辑器。导航到 “计算机配置”->“Windows 设置”->“安全设置”->“本地策略”->“安全选项”。找到 “账户：使用空白密码的本地账户只允许控制台登录” 策略，双击打开并选择 “已禁用”。

进行远程连接：在控制端电脑上，按下 Windows+R 键，输入 “mstsc” 打开远程桌面连接应用，输入被控端电脑的 IP 地址和本地账号用户名，即可尝试远程连接。
需注意，这种设置会降低系统安全性，建议仅在受信任的网络环境中使用。

        function increaseFontSize() {
            var textarea = document.getElementById('myInput');
            var currentSize = parseInt(window.getComputedStyle(textarea).fontSize);
            textarea.style.fontSize = (currentSize + 2) + 'px';
        }

        function decreaseFontSize() {
            var textarea = document.getElementById('myInput');
            var currentSize = parseInt(window.getComputedStyle(textarea).fontSize);
            if (currentSize > 2) {
                textarea.style.fontSize = (currentSize - 2) + 'px';
            }
        }
