噪音对人体和环境都有诸多危害，主要体现在以下几个方面：
噪音对人体和环境都有诸多危害，主要体现在以下几个方面：
对人体健康的危害
听力损伤：长期暴露在噪音环境中，会导致听力下降，出现耳鸣、耳痛等症状，严重时可能造成永久性耳聋。比如长期在高分贝工厂工作的工人，若不注意防护，听力很容易受损。
影响心血管系统：噪音会使人体交感神经紧张，导致血压升高、心率加快，增加心脏病、高血压等疾病的发病风险。
干扰神经系统：可能引发头痛、头晕、失眠、记忆力减退等问题，还会使人情绪烦躁、焦虑，影响心理状态。
影响消化系统：噪音会抑制胃肠蠕动和消化液分泌，导致消化不良、食欲不振等。
对生活和工作的影响
干扰人们的正常交谈、学习和工作，降低注意力和工作效率。例如在嘈杂的环境中，学生难以集中精力学习，办公人员工作易出错。
影响睡眠质量，导致入睡困难、睡眠浅、易醒等，进而影响白天的精神状态。
对环境和生态的危害
对动物而言，噪音会干扰它们的通讯、繁殖和觅食，破坏野生动物的栖息地，影响生态平衡。比如机场附近的鸟类，可能因噪音而改变迁徙路线或繁殖行为。
