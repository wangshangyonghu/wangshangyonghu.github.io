铆钉分类
按形状：圆头铆钉、平头铆钉、沉头铆钉、半沉头铆钉、空心铆钉、实心铆钉、管状铆钉等。
按用途：结构用铆钉、非结构用铆钉、防水铆钉、密封铆钉等。
按材质：铝铆钉、铜铆钉、不锈钢铆钉、铁铆钉等。
按安装方式：拉铆钉、压铆铆钉、击芯铆钉、自冲铆钉等。
铆钉材质
碳钢、合金钢、铝合金、铜合金、钛合金、不锈钢 304、不锈钢 316 等。
铆钉工具
拉铆枪、压铆机、铆钉枪、铆接机、气动铆钉枪、液压铆钉枪等。
铆钉工艺
铆接、拉铆、压铆、热铆、冷铆、自冲铆接、无铆钉铆接等。
铆钉应用
航空航天、汽车制造、船舶制造、电子设备、建筑工程、家具制造、服装行业、医疗器械等。
其他相关
