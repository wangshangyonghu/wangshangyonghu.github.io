<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个位数加法练习</title>
    <!-- 页面标题（浏览器标签显示） -->

    <meta name="keywords" content="网上用户,个位数加法练习">
    <!-- 页面描述 -->
    <meta name="description" content="网上用户专属内容介绍:个位数加法练习">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            max-width: 500px;
            margin: 30px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 40px;
            color: #333;
        }
        .question-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            font-size: 48px;
            margin-bottom: 40px;
        }
        #answerInput {
            width: 120px;
            height: 60px;
            font-size: 48px;
            text-align: center;
            border: 2px solid #333;
        }
        .tip-text {
            font-size: 22px;
            height: 30px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .right {
            color: #09b83e;
        }
        .wrong {
            color: #f53f3f;
        }
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 320px;
            margin: 0 auto;
        }
        .key-btn {
            height: 70px;
            font-size: 32px;
            border: 2px solid #666;
            background: #fff;
            cursor: pointer;
            border-radius: 6px;
        }
        .key-btn:active {
            background: #eee;
        }
    </style>
</head>
<body>
    <h1>个位数加法练习</h1>

    <div class="question-box">
        <span id="num1">5</span>
        <span>+</span>
        <span id="num2">3</span>
        <span>=</span>
        <input type="text" id="answerInput" readonly>
    </div>

    <div class="tip-text" id="tip"></div>

    <div class="keyboard">
        <button class="key-btn" data-val="1">1</button>
        <button class="key-btn" data-val="2">2</button>
        <button class="key-btn" data-val="3">3</button>
        <button class="key-btn" data-val="4">4</button>
        <button class="key-btn" data-val="5">5</button>
        <button class="key-btn" data-val="6">6</button>
        <button class="key-btn" data-val="7">7</button>
        <button class="key-btn" data-val="8">8</button>
        <button class="key-btn" data-val="9">9</button>
        <button class="key-btn" data-val="">清空</button>
        <button class="key-btn" data-val="">确认</button>
        <button class="key-btn" data-val="0">0</button>
    </div>

    <script>
        // 获取DOM元素
        const num1El = document.getElementById('num1');
        const num2El = document.getElementById('num2');
        const answerInput = document.getElementById('answerInput');
        const tipEl = document.getElementById('tip');
        const keyBtns = document.querySelectorAll('.key-btn');

        let a, b, correctAnswer;

        // 随机生成题目函数
        function createNewQuestion() {
            tipEl.textContent = '';
            answerInput.value = '';
            // 生成1-9的随机数
            a = Math.floor(Math.random() * 9) + 1;
            b = Math.floor(Math.random() * 9) + 1;
            correctAnswer = a + b;
            num1El.textContent = a;
            num2El.textContent = b;
        }

        // 数字键盘点击事件
        keyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.dataset.val;
                const text = btn.textContent;
                if (text === '清空') {
                    answerInput.value = '';
                } else if (text === '确认') {
                    checkAnswer();
                } else {
                    // 限制最多两位数字（和最大9+9=18）
                    if (answerInput.value.length < 2) {
                        answerInput.value += val;
                    }
                }
            })
        })

        // 校验答案
        function checkAnswer() {
            const userAns = Number(answerInput.value);
            if (isNaN(userAns)) {
                tipEl.textContent = '请输入数字！';
                tipEl.className = 'tip-text wrong';
                return;
            }
            if (userAns === correctAnswer) {
                tipEl.textContent = '回答正确！';
                tipEl.className = 'tip-text right';
                // 答对1秒后刷新题目
                setTimeout(createNewQuestion, 1000);
            } else {
                tipEl.textContent = '答案错误，请重试';
                tipEl.className = 'tip-text wrong';
            }
        }

        // 页面初始化生成第一题
        createNewQuestion();
    </script>
</body>
</html>
